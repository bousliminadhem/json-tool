<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Magic | Pro Developer Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --accent: #58a6ff;
            --text: #c9d1d9; --success: #3fb950; --border: #30363d;
            --error: #f85149; --warning: #d29922;
        }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: var(--text); display: flex; flex-direction: column; min-height: 100vh; }
        .nav { background: var(--card); padding: 1rem 5%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo { color: var(--accent); font-weight: 600; font-size: 1.2rem; text-decoration: none; }
        .wrapper { display: flex; gap: 20px; padding: 20px 5%; flex: 1; }
        .tool-area { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .ad-sidebar { width: 300px; min-height: 600px; background: var(--card); border-radius: 12px; border: 1px dashed #484f58; display: flex; align-items: center; justify-content: center; color: #484f58; font-size: 0.8rem; position: sticky; top: 20px; }
        .editor-box { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        .toolbar { background: #21262d; padding: 10px 15px; display: flex; gap: 10px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
        textarea { width: 100%; height: 350px; background: transparent; color: #8b949e; border: none; padding: 15px; font-family: 'Fira Code', monospace; font-size: 14px; outline: none; resize: vertical; box-sizing: border-box; }
        .output-panel { background: #010409; padding: 20px; min-height: 200px; border-top: 1px solid var(--border); position: relative; overflow-x: auto; }
        #out { font-family: 'Fira Code', monospace; font-size: 14px; line-height: 1.5; color: var(--success); white-space: pre; tab-size: 4; margin: 0; }
        button { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        button:hover { filter: brightness(1.1); }
        button.sec { background: #30363d; color: var(--text); }
        .toast { position: absolute; top: 10px; right: 10px; background: var(--success); color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; display: none; }
        .repair-note { font-size: 0.75rem; color: var(--warning); display: none; padding: 8px; background: rgba(210, 153, 34, 0.1); border-radius: 4px; margin-bottom: 10px; }
        footer { padding: 40px 5%; background: var(--card); border-top: 1px solid var(--border); margin-top: 20px; }
        @media (max-width: 1024px) { .wrapper { flex-direction: column; } .ad-sidebar { width: 100%; height: 250px; min-height: 250px; position: static; } }
    </style>
</head>
<body>

<div class="nav"><a href="#" class="logo">JSON MAGIC ✨</a></div>

<div class="wrapper">
    <main class="tool-area">
        <div class="editor-box" id="main-editor">
            <div class="toolbar">
                <button onclick="formatJSON(true)">Beautify</button>
                <button class="sec" onclick="formatJSON(false)">Minify</button>
                <button class="sec" onclick="loadSample()">Sample</button>
                <button class="sec" onclick="copyCode()">Copy Code</button>
                <button class="sec" onclick="clearAll()">Clear</button>
            </div>
            <textarea id="in" placeholder="Paste messy or broken JSON here..."></textarea>
            <div class="output-panel">
                <div class="toast" id="t">Copied!</div>
                <div id="repair-msg" class="repair-note">⚠️ Auto-repaired structure (Missing colons or quotes fixed)</div>
                <pre id="out">// Formatted output will appear here...</pre>
            </div>
        </div>
    </main>

    <aside class="ad-sidebar">
        <div style="text-align: center;">ADVERTISEMENT<br><small>(300x600 Skyscraper)</small></div>
    </aside>
</div>

<footer>
    <h3>Why use JSON Magic?</h3>
    <p>Safe, client-side processing. Your data never leaves your browser.</p>
    <p style="opacity: 0.6; font-size: 0.8rem;">&copy; 2026 Developer Utility Tools.</p>
</footer>

<script>
    let debounceTimer;

    function superRepair(str) {
        let fixed = str.trim();
        fixed = fixed.replace(/'/g, '"');
        fixed = fixed.replace(/("[\w]+")\s*("[\w]+"|\d+|true|false|null|{|\[)/g, '$1: $2');
        fixed = fixed.replace(/([{,]\s*)([a-zA-Z0-9_]+)(\s*:)/g, '$1"$2"$3');
        fixed = fixed.replace(/,\s*([\]}])/g, '$1');
        return fixed;
    }

    function formatJSON(beautify = true) {
        const input = document.getElementById('in').value;
        const out = document.getElementById('out');
        const repairMsg = document.getElementById('repair-msg');

        if(!input.trim()) return;

        repairMsg.style.display = "none";
        out.style.color = "#8b949e";
        out.textContent = "Processing...";

        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
            let parsed;
            try {
                parsed = JSON.parse(input);
                render(parsed, beautify);
            } catch (e) {
                try {
                    let repaired = superRepair(input);
                    parsed = JSON.parse(repaired);
                    repairMsg.style.display = "block";
                    render(parsed, beautify);
                } catch (finalError) {
                    out.textContent = "Invalid JSON: " + finalError.message;
                    out.style.color = "var(--error)";
                }
            }
        }, 200);
    }

    function render(data, beautify) {
        const out = document.getElementById('out');
        out.textContent = beautify ? JSON.stringify(data, null, 4) : JSON.stringify(data);
        out.style.color = "var(--success)";
    }

    function loadSample() {
        const broken = `{
    "name" "JSON Magic"
    'version' 2.1,
    "feature": "Self Healing"
}`;
        document.getElementById('in').value = broken;
        formatJSON(true);
    }

    function copyCode() {
        const txt = document.getElementById('out').textContent;
        if(txt.includes("//") || txt.startsWith("Invalid")) return;
        
        navigator.clipboard.writeText(txt).then(() => {
            const toast = document.getElementById('t');
            toast.style.display = "block";
            setTimeout(() => { toast.style.display = "none"; }, 2000);
        });
    }

    function clearAll() {
        document.getElementById('in').value = "";
        document.getElementById('out').textContent = "// Formatted output will appear here...";
        document.getElementById('repair-msg').style.display = "none";
    }
</script>

</body>
</html>
