<script>
let debounceTimer;

// 🔥 1. ADVANCED HEALER (handles structural + syntax issues)
function absoluteHealer(str) {
    let s = str.trim();

    // Normalize spaces & quotes
    s = s.replace(/[\u00A0-\u3000\ufeff]/g, " ");
    s = s.replace(/'/g, '"');

    // Remove control chars
    s = s.replace(/[\x00-\x1F]+/g, "");

    // Quote keys
    s = s.replace(/([{,]\s*)([a-zA-Z0-9._-]+)\s*:/g, '$1"$2":');

    // Fix missing colons
    s = s.replace(/(")\s+(?=")/g, '$1: ');

    // Fix duplicate commas
    s = s.replace(/,+/g, ',');

    // Fix missing commas between values
    s = s.replace(/("|\d|true|false|null|\}|\])\s+(?=")/g, '$1, ');

    // Remove trailing commas
    s = s.replace(/,\s*([\]}])/g, '$1');

    // --- STRUCTURE REPAIR (stack-based) ---
    let stack = [];
    let result = '';

    for (let i = 0; i < s.length; i++) {
        let char = s[i];

        if (char === '{' || char === '[') {
            stack.push(char);
            result += char;
        } 
        else if (char === '}' || char === ']') {
            if (stack.length) {
                stack.pop();
                result += char;
            }
            // ignore extra closing brackets
        } 
        else {
            result += char;
        }
    }

    // Auto-close missing structures
    while (stack.length) {
        let last = stack.pop();
        result += (last === '{') ? '}' : ']';
    }

    // Wrap if not valid root
    if (!result.trim().startsWith('{') && !result.trim().startsWith('[')) {
        result = '{' + result + '}';
    }

    return result;
}

// 🔠 2. SORT OBJECT KEYS
function sortObject(obj) {
    if (Array.isArray(obj)) return obj.map(sortObject);
    if (obj === null || typeof obj !== 'object') return obj;

    return Object.keys(obj).sort().reduce((acc, key) => {
        acc[key] = sortObject(obj[key]);
        return acc;
    }, {});
}

// ⚙️ 3. MAIN FORMAT FUNCTION
function formatJSON() {
    const inputVal = document.getElementById('in').value;
    const out = document.getElementById('out');
    const repairMsg = document.getElementById('repair-msg');

    if (!inputVal.trim()) return;

    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
        try {
            let processedData;
            let wasRepaired = false;

            try {
                // Try normal parse first
                processedData = JSON.parse(inputVal);
            } catch (e) {
                // Apply repair
                const healed = absoluteHealer(inputVal);
                processedData = JSON.parse(healed);
                wasRepaired = true;
            }

            // Sort keys
            const organizedData = sortObject(processedData);

            repairMsg.style.display = wasRepaired ? "block" : "none";

            render(organizedData);

        } catch (finalError) {
            out.innerHTML = `<span style="color:var(--error)">
                Unrepairable structural error: ${finalError.message}
            </span>`;
        }
    }, 150);
}

// 🎨 4. RENDER WITH HIGHLIGHT + PERFECT INDENT
function render(data) {
    const out = document.getElementById('out');
    const jsonString = JSON.stringify(data, null, 4);

    const original = document.getElementById('in').value;

    const highlighted = jsonString
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/(".*?"|\btrue\b|\bfalse\b|\bnull\b|\d+)/g, (match) => {
            return original.includes(match.replace(/"/g, ''))
                ? match
                : `<mark style="background:#23863644;color:#79c0ff;border-radius:2px;">${match}</mark>`;
        });

    out.innerHTML = highlighted;
}

// ⌨️ OPTIONAL: AUTO FORMAT ON INPUT
document.getElementById('in').addEventListener('input', formatJSON);
</script>
